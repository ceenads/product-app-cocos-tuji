name: Publish Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Select Cocos Web build
        run: |
          set -euo pipefail
          for dir in build/web-mobile build/web-desktop build/web dist; do
            if [ -f "$dir/index.html" ]; then
              echo "PUBLISH_DIR=$dir" >> "$GITHUB_ENV"
              exit 0
            fi
          done
          echo "::error::No Cocos Web build found. Commit build/web-mobile, build/web-desktop, build/web, or dist before publishing Pages."
          exit 1

      - name: Publish to gh-pages
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test -f "$PUBLISH_DIR/index.html"
          site="$(mktemp -d)"
          rsync -a --delete "$PUBLISH_DIR"/ "$site"/
          find "$site" -name '.DS_Store' -delete
          touch "$site/.nojekyll"

          cd "$site"
          git init -q
          git checkout -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish pages ${GITHUB_SHA::7}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages:gh-pages
